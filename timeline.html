<!DOCTYPE html>
<html>
  <head>
    <title>Major Project</title>
    <style> .background {
      background-color: #524632;
      width: 3000px;
      height: 100vh;
    }
    /* Controls the lenght of the timline */
    .timeline, 
    .background {
      width: 3000px;
    }
    .timeline 
    {
        border-bottom: 5px dashed black;
        position: absolute;
        top: 50%;
    }
    .boxes {
        border: 5px solid black;
        width: 100px;
        height: 60px;
        position: absolute;
    }
    .t1 {
        top: 60%;
        left: 40px;
    }
    .t2 {
        top: 40%;
        left: 180px;
    }
    </style>
  </head>
  <body>
    <main>
      <div class="background"></div>
      <div class="boxes t1"></div>
      <div class="boxes t2"></div>
      <div class="timeline"></div>
    </main>
  </body>
</html>
